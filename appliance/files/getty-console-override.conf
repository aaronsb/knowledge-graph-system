# Drop-in override for getty@tty1: run the KG appliance console menu instead of
# a bare login prompt. Installed by build-appliance.sh to
# /etc/systemd/system/getty@tty1.service.d/override.conf
#
# getty@.service already wires the controlling tty (TTYPath, StandardInput=tty,
# etc.); we only replace the ExecStart program. The leading empty ExecStart=
# clears the inherited agetty command. The console script's "Login shell" option
# execs /bin/login for an authenticated shell, so this isn't an auth bypass.
[Service]
ExecStart=
ExecStart=-/opt/kg/appliance/files/kg-console.sh
Type=idle
Restart=always
