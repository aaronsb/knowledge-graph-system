# ============================================================================
# Knowledge Graph System — in-VM Traefik router (ADR-105)
# ============================================================================
# Single front door for the appliance: one ingress routes by path to the web
# SPA and the API, so the CLI / FUSE / MCP get a consistent endpoint regardless
# of internal container ports.
#
#   http://<host>/        -> web   (nginx static SPA, container :80)
#   http://<host>/api/... -> api   (:8000, /api prefix stripped)
#
# This overlay is HTTP-only (ADR-105 migration step 1) — it proves routing
# before any TLS. Cert termination (selfsigned / letsencrypt / manual / offload)
# lands in a later PR as Traefik certResolvers.
#
# Activated by ROUTER_MODE=traefik (operator get_compose_cmd / start-platform).
# Default ROUTER_MODE=none leaves this overlay out entirely — no behavior change.
#
# Network: the platform's base/prod/dev compose files disagree on which network
# web+api sit on (kg-network vs kg-internal, list- vs map-form). Rather than
# depend on that, this overlay declares its OWN `kg-router` network and joins
# traefik + web + api to it — so Traefik shares a network with both backends in
# every assembly. (Compose unions the per-service network lists on merge.)
# ============================================================================

networks:
  kg-router:
    name: knowledge-graph-router

services:
  traefik:
    # Traefik Proxy core is MIT-licensed (ADR-105 licensing posture). Pinned.
    image: traefik:v3.3.1
    container_name: ${CONTAINER_PREFIX:-knowledge-graph}-traefik
    restart: unless-stopped
    # NOTE on modern Docker Engine: Traefik v3.3.1's Docker provider HARD-CODES
    # API version 1.24 and ignores the DOCKER_API_VERSION env (it builds its
    # client with an explicit WithVersion("1.24")). Engine >=25 raised its
    # minimum served API to 1.40, so it rejects 1.24 with "client version 1.24
    # is too old". The fix lives on the DAEMON, not here: set
    # DOCKER_MIN_API_VERSION=1.24 on dockerd to keep serving the old API. The
    # appliance bakes that as a docker.service drop-in (appliance/build-appliance.sh).
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      # Resolve backends on the shared router network (web/api also sit on
      # kg-internal/kg-network; pin the one they share with traefik).
      - --providers.docker.network=knowledge-graph-router
      - --entrypoints.web.address=:80
    ports:
      - "${KG_HTTP_PORT:-80}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - kg-router
    depends_on:
      - web
      - api

  web:
    # SPA calls the API same-origin through the router, not a separate port.
    # The OAuth client_id + redirect_uri must match what operator init registers
    # (kg-web, redirect = ${EXTERNAL_URL}/callback). The web image's baked
    # defaults are kg-cli + http://localhost:3000/callback, and prod.yml — which
    # normally overrides them — is NOT in the appliance/router assembly, so set
    # them here. Without this, login fails with 400 ("OAuth client 'kg-cli' not
    # found") at the router-fronted deployment.
    environment:
      VITE_API_URL: /api
      VITE_OAUTH_CLIENT_ID: kg-web
      VITE_OAUTH_REDIRECT_URI: ${EXTERNAL_URL:-http://localhost}/callback
    # Serve the SPA over plain HTTP on :80. Overrides the non-router prod mount
    # (nginx.prod.conf does :80 -> 301 https with host-specific certs, which
    # would break the HTTP-only ingress). Same container target wins on merge.
    volumes:
      - ./nginx.router.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      kg-router: {}
    labels:
      - traefik.enable=true
      - traefik.docker.network=knowledge-graph-router
      # Catch-all (lowest priority): everything not matched by /api goes to web.
      - "traefik.http.routers.kgweb.rule=PathPrefix(`/`)"
      - traefik.http.routers.kgweb.entrypoints=web
      - traefik.http.routers.kgweb.priority=1
      - traefik.http.services.kgweb.loadbalancer.server.port=80

  api:
    networks:
      kg-router: {}
    labels:
      - traefik.enable=true
      - traefik.docker.network=knowledge-graph-router
      # Higher priority than the web catch-all so /api wins.
      - "traefik.http.routers.kgapi.rule=PathPrefix(`/api`)"
      - traefik.http.routers.kgapi.entrypoints=web
      - traefik.http.routers.kgapi.priority=10
      - traefik.http.middlewares.kgapi-strip.stripprefix.prefixes=/api
      - traefik.http.routers.kgapi.middlewares=kgapi-strip
      - traefik.http.services.kgapi.loadbalancer.server.port=8000
