# Nginx config for the web SPA when fronted by the in-VM Traefik router
# (ADR-105, ROUTER_MODE=traefik). HTTP-only: Traefik owns TLS termination and
# routes /api to the API directly, so this server just serves the static SPA on
# :80 — no http->https redirect (that's nginx.prod.conf's job in the non-router
# topology), no /api proxy (Traefik handles it).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Backup restore (ADR-015) / ingest multipart bodies exceed nginx's 1 MB
    # default; keep the bounded cap consistent with the other nginx configs.
    client_max_body_size 256m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Runtime config — generated at container start from env vars. Never cache.
    location = /config.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Content-hashed Vite bundles are safe to cache immutably.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing — serve index.html for client-side routes (/callback, etc.).
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
