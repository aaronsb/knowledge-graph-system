# Nginx configuration for Knowledge Graph Visualizer SPA
# Handles React Router client-side routing

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Runtime config — generated by docker-entrypoint.sh from env vars at
    # container start. Must never be cached, or clients will keep the previous
    # deploy's API URL / OAuth settings indefinitely. Exact-match `location =`
    # takes precedence over the regex below.
    location = /config.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Cache static assets. Vite emits content-hashed bundles under /assets/,
    # so immutable caching is safe for them. Root-level assets (favicons, etc.)
    # benefit from the same rule — only /config.js needs the exemption above.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing - serve index.html for all routes
    # This allows React Router to handle /callback and other client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
