name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for git history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install mkdocs-material mkdocs-swagger-ui-tag

      - name: Generate reference docs (CLI, MCP, FUSE, schema)
        # Reference pages are generated from code, not hand-written
        # (specs/documentation-consolidation-spec.md §5). Regenerate them on every
        # deploy so they cannot drift from the source of truth.
        run: |
          # docs:cli/docs:mcp import from cli/dist, so the CLI must be built first.
          (cd cli && npm install && npm run build && npm run docs:cli && npm run docs:mcp)
          python3 fuse/scripts/generate-fuse-docs.py
          # Schema: markdown + DBML from the DDL, then the interactive ER diagram
          # (render reads schema.dbml, so it must run after the Python generator).
          python3 schema/scripts/generate-schema-docs.py
          (cd schema/scripts && npm ci && node render-schema-diagram.mjs)

      - name: Build and deploy
        run: mkdocs gh-deploy --force
