name: Lint

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  query-safety:
    name: Query Safety Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run query safety linter
        run: |
          python3 scripts/development/lint/lint_queries.py api/app || true

      - name: Report baseline technical debt
        run: |
          echo "ℹ️  Query safety baseline: 3 known unsafe queries"
          echo "   - database.py:195 (health check)"
          echo "   - restore_worker.py:230-233 (restore operations)"
          echo "   These will be fixed in Phase 2 (Critical Path Migration)"
          echo "   See: docs/architecture/QUERY_SAFETY_BASELINE.md"

  python-syntax:
    name: Python Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          python3 -m py_compile $(find api/app scripts -name "*.py")

  docs-link-check:
    name: Docs Link Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for broken local links in docs/
        run: |
          python3 scripts/development/lint/link_check.py --fail-on-broken

  docs-catalog-lint:
    name: Docs Catalog Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Lint documentation catalog (frontmatter + decision graph)
        # Validates the docs catalog (ADR-087): id/domain/mode frontmatter,
        # the related/supersedes reference graph, and nav membership. Both
        # catalog pages and ADRs are enforced — --enforce-adrs promotes ADR
        # graph issues (dangling related/supersedes refs, supersede cycles) to
        # errors now that the ADR frontmatter sweep has landed.
        run: |
          python3 docs/scripts/doclint.py --check --enforce-adrs

  # TODO: Add full test infrastructure in future
  # pytest-unit:
  #   name: Unit Tests
  #   runs-on: ubuntu-latest
  #   steps:
  #     - Requires: PostgreSQL + Apache AGE
  #     - Requires: Test database setup/teardown
  #     - Requires: Mock fixtures
  #   Deferred until test infrastructure is set up

  typescript-build:
    name: TypeScript Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: cli

      - name: Build TypeScript client
        run: npm run build
        working-directory: cli

      - name: Check for build artifacts
        run: |
          if [ ! -f "cli/dist/index.js" ]; then
            echo "❌ Build failed - cli/dist/index.js not found"
            exit 1
          fi
          echo "✅ TypeScript CLI built successfully"

  shell-syntax:
    name: Shell Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Syntax-check tracked shell scripts
        # bash -n parses without executing — catches the breakage class that
        # would otherwise surface only at the next manual run of operator.sh or
        # appliance/build-appliance.sh (the latter is no longer built in CI).
        run: |
          fail=0
          while IFS= read -r f; do
            if ! bash -n "$f"; then
              echo "❌ syntax error: $f"
              fail=1
            fi
          done < <(git ls-files '*.sh')
          [ "$fail" -eq 0 ] && echo "✅ all tracked shell scripts parse cleanly"
          exit "$fail"
