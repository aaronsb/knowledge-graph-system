name: Publish CLI to npm

# Publishes @aaronsb/kg-cli to the npm registry via OIDC Trusted Publishing.
#
# No npm token is used. npm retired classic Automation tokens, and a granular
# token still trips npm's 2FA-on-publish enforcement (EOTP) in a non-interactive
# shell. Instead we authenticate via GitHub OIDC against the Trusted Publisher
# configured for @aaronsb/kg-cli on npmjs.com (Package Settings -> Trusted
# Publisher -> GitHub Actions: aaronsb/knowledge-graph-system, workflow
# publish-npm.yml). This bypasses 2FA, needs no secret, and never expires.
#
# Requirements: `id-token: write` permission, and npm >= 11.5.1 (the version
# that added OIDC publish auth — newer than what Node 22 bundles, so we upgrade
# npm explicitly). Do NOT set NODE_AUTH_TOKEN: a token would take precedence
# over OIDC and reintroduce the EOTP failure.
#
# Trigger: on a pushed v* tag, or manually via workflow_dispatch.
#
# We trigger on the tag push rather than `release: published` on purpose.
# GitHub suppresses workflow triggers from events generated by the Actions
# GITHUB_TOKEN (anti-recursion), so a release/tag created by create-release.yml
# (which uses GITHUB_TOKEN) would NOT fire a `release:`-triggered run. A tag
# pushed from a maintainer's own credentials (local `publish.sh release`, or a
# manual `git push origin vX.Y.Z`) fires normally. If you ever cut the release
# via the create-release.yml dispatch instead, run this workflow manually
# (workflow_dispatch) since its tag push won't trigger it automatically.
#
# Note: the CLI is versioned INDEPENDENTLY of the platform release tag — a
# v0.X.Y platform release does not imply a CLI bump. This job publishes whatever
# version is in cli/package.json and skips cleanly if that version already
# exists on npm, so it is safe to fire on every tag.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish-npm:
    name: Build and publish @aaronsb/kg-cli
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required so npm can mint an OIDC token and attach build provenance,
      # which is what lets a granular token publish without an interactive OTP.
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history + tags so cli/scripts/generate-version.js can resolve
          # the version string via `git describe --tags`.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Node 22 bundles npm 10.x; OIDC Trusted Publishing auth needs >= 11.5.1.
      - name: Upgrade npm for OIDC publishing
        run: npm install -g npm@latest

      # cli/package-lock.json is gitignored in this repo, so `npm ci` (which
      # requires a committed lockfile) is not usable here — use `npm install`.
      - name: Install dependencies
        working-directory: cli
        run: npm install

      - name: Build CLI
        working-directory: cli
        run: npm run build

      - name: Check whether this version is already published
        id: check
        working-directory: cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@aaronsb/kg-cli@$VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@aaronsb/kg-cli@$VERSION is already on npm — skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.already_published == 'false'
        working-directory: cli
        # Auth is via OIDC (Trusted Publisher) — intentionally no NODE_AUTH_TOKEN.
        run: npm publish --provenance --access public

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.already_published }}" = "true" ]; then
            echo "⏭️  @aaronsb/kg-cli@${{ steps.check.outputs.version }} already published — no action." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ Published @aaronsb/kg-cli@${{ steps.check.outputs.version }} to npm." >> "$GITHUB_STEP_SUMMARY"
          fi
