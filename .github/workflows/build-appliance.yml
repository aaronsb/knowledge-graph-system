name: Build Appliance Image

# Builds the x86 thin-appliance (qcow2 + OVA) and publishes it as release
# assets. Unlike the container images (built locally + pushed by
# build-containers.yml), the appliance image is a rare release artifact, so CI
# is the right home for it (ADR-103 Stage 2 distribution).
#
# Triggers: manual (workflow_dispatch) for testing, and automatically when a
# GitHub Release is published (attaches the image to that release).
on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write   # upload release assets

jobs:
  build-appliance:
    name: Build x86 thin-appliance (qcow2 + OVA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git archive + git describe need full history/tags

      - name: Install libguestfs + qemu + xorriso
        run: |
          sudo apt-get update
          sudo apt-get install -y libguestfs-tools qemu-utils xorriso

      - name: Make the host kernel readable by libguestfs
        # supermin builds its appliance from the host kernel; GitHub runners ship
        # /boot/vmlinuz-* mode 0600, which libguestfs (running unprivileged) can't
        # read. This is the standard CI workaround.
        run: sudo chmod 0644 /boot/vmlinuz-* || true

      - name: Build appliance (qcow2 + OVA)
        # force_tcg: GitHub runners may not expose /dev/kvm; TCG is slower but
        # always works. The build is network-heavy (Debian base + apt +
        # get.docker.com inside the appliance), so allow a generous timeout.
        env:
          LIBGUESTFS_BACKEND_SETTINGS: force_tcg
        run: ./appliance/build-appliance.sh --ova

      - name: Compress qcow2
        # The raw qcow2 (~2 GB) exceeds GitHub's 2 GB per-asset limit; the image
        # is mostly sparse, so xz shrinks it well under the cap.
        run: xz -T0 -6 appliance/out/*.qcow2

      - name: Checksums
        run: |
          cd appliance/out
          sha256sum *.qcow2.xz *.ova > SHA256SUMS
          cat SHA256SUMS

      - name: Attach to the GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            appliance/out/*.qcow2.xz
            appliance/out/*.ova
            appliance/out/SHA256SUMS

      - name: Upload as workflow artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: kg-appliance
          path: |
            appliance/out/*.qcow2.xz
            appliance/out/*.ova
            appliance/out/SHA256SUMS
          retention-days: 14
